name: Metricon CI

on:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show working directory
        run: |
          pwd
          ls -la
          echo "----- package.json -----"
          cat package.json

      - name: Install dependencies
        run: npm install

      - name: Verify package scripts
        run: cat package.json

      - name: Build frontend
        run: npm run build

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: programs/metricon_vault/src

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo check
        run: cargo check
