name: Metricon CI

on:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install from root (where package.json is)
      - run: npm install

      # Build from src (where Next app actually lives)
      - run: npm run build
        working-directory: ./src

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: programs/metricon_vault/src

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo check
